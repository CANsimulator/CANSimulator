<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CAN Simulator</title>
    <!--
      Single-Page App GitHub Pages 404 redirect.
      Based on: https://github.com/rafgraph/spa-github-pages

      When GitHub Pages 404s on a deep route (e.g. /CANSimulator/physical),
      it serves this file. We encode the route as a query string and redirect
      to the repo root so the React app can boot and handle the route itself.

      pathSegmentsToKeep = 1  →  keeps /CANSimulator as the basename.
    -->
    <script>
      (function(l) {
        var pathSegmentsToKeep = 1;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }(window.location));
    </script>
  </head>
  <body></body>
</html>
