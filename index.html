<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>CAN Simulator - Master the ISO 11898 Protocol</title>
    <meta name="description" content="Advanced Interactive CAN Protocol Simulator. Master automotive diagnostics (CAN/FD) instantly—right in your browser. Cyber-ready and WCAG AAA compliant." />
    <meta name="theme-color" content="#00f3ff" />
    <!-- GitHub Pages SPA: decode the redirect produced by 404.html -->
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          // Reconstruct the original path, query string, and hash.
          var q = params.get('q');
          var h = params.get('h');
          var url =
            window.location.pathname.split('?')[0].replace(/\/$/, '') +
            p.replace(/~and~/g, '&') +
            (q ? '?' + q.replace(/~and~/g, '&') : '') +
            (h ? '#' + h : '');
          window.history.replaceState(null, null, url);
        }
      })();
    </script>
  </head>
  <body class="bg-dark-900 scroll-smooth">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
