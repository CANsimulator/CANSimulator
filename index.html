<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>CAN Simulator - Master the ISO 11898 Protocol</title>
    <meta name="description" content="Advanced Interactive CAN Protocol Simulator. Master automotive diagnostics (CAN/FD) instantly—right in your browser. Cyber-ready and WCAG AAA compliant." />
    <meta name="theme-color" content="#00f3ff" />
    <!-- GitHub Pages SPA: decode the redirect produced by 404.html -->
    <!-- Based on https://github.com/rafgraph/spa-github-pages -->
    <script>
      (function (l) {
        // 404.html redirects deep routes as: /CANSimulator/?/physical
        // l.search[1] === '/' detects that sentinel.
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + (decoded[0][0] === '/' ? decoded[0] : '/' + decoded[0]) +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body class="bg-dark-900 scroll-smooth">
    <div id="root"></div>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('can_theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (theme === 'dark' || (!theme && prefersDark)) {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch(e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
